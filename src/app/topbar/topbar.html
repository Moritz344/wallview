<div class="container">
  <div class="options-right">
    <button><img src="minimize.svg"></button>
    <button (click)="onClose()"><img src="close.svg"></button>
  </div>
  <div class="options-middle">
    <button (click)="onSwitchTab('local')"  [class.selected]="tab() == 'local'">Local</button>
    <button (click)="onSwitchTab('browse')"  [class.selected]="tab() == 'browse'">Browse</button>
  </div>
</div>
