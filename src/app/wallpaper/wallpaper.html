@if (showFullscreenMode()) {
    <div class="screen"></div>
    <div class="fullscreen-container">
        <img style="border-radius: 10px" [src]="wallpaperToShowFullscreen()">
        <button (click)="onCloseFullscreen()" class="fullscreen-close"><img src="close.svg"></button>
    </div>
    @if (showInFolderOption) {
      <button class="open-in-folder" (click)="onOpenWallpaperInFolder()"><img src="open_in_folder.svg" width="30"
      style="float: left;margin-right: 5px" class="white-img">Open In Folder</button>
    }
}

<div class="container">
  <div class="container-items">
    @for (wallpaper of wallpapers(); track $index) {
      <img (click)="onShowFullscreen(wallpaper.path)" [src]="wallpaper.path">
    }
  </div>

  <div class="container-bottom">
    @if (mode == "load-more") {
      <button (click)="onLoadMore()" [disabled]="wallpapers().length < 5" [class.disabled]="wallpapers().length < 5" class="load-more">Load more</button>
    } @else {
      <button (click)="onPrevPage()">Prev</button>
      <button (click)="onNextPage()">Next</button>
    }
  </div>
</div>
